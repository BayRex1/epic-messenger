<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пост - Epic Messenger</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .post-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .post-full {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .post-full .post-content {
            font-size: 18px;
            line-height: 1.6;
        }
        .post-full .post-media img {
            max-height: 500px;
            border-radius: 12px;
        }
        .post-stats {
            display: flex;
            gap: 30px;
            padding: 15px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            margin: 15px 0;
        }
        .post-stats span {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .post-stats strong {
            font-size: 18px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-color);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .back-btn:hover {
            color: var(--accent-hover);
        }
        .comments-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }
        .comments-section h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        .comment-item {
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .comment-item:last-child {
            border-bottom: none;
        }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            overflow: hidden;
        }
        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .comment-name {
            font-weight: 600;
            font-size: 14px;
        }
        .comment-time {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .comment-text {
            font-size: 15px;
            line-height: 1.5;
            margin-left: 48px;
        }
        .comment-actions {
            margin-left: 48px;
            margin-top: 8px;
            display: flex;
            gap: 15px;
        }
        .comment-like {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
        }
        .comment-like.liked {
            color: #e74c3c;
        }
        .comment-like:hover {
            color: var(--text-primary);
        }
        .comment-like.liked:hover {
            color: #c0392b;
        }
        .reply-section {
            margin-left: 48px;
            margin-top: 10px;
            display: none;
        }
        .reply-section.active {
            display: block;
        }
        .reply-section textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            resize: vertical;
            font-size: 14px;
        }
        .reply-section .send-btn {
            margin-top: 8px;
            padding: 8px 16px;
            font-size: 13px;
        }
        .reply-item {
            margin-left: 48px;
            padding: 10px 0;
            border-top: 1px solid var(--border-color);
        }
        .reply-item:first-child {
            border-top: none;
        }
        .reply-item .comment-header {
            margin-bottom: 4px;
        }
        .reply-item .comment-text {
            margin-left: 48px;
            font-size: 14px;
        }
        .add-comment {
            margin-top: 20px;
        }
        .add-comment textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            resize: vertical;
            font-size: 15px;
            min-height: 80px;
        }
        .add-comment .send-btn {
            margin-top: 10px;
            padding: 10px 24px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .post-not-found {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .post-not-found h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
    </style>
</head>

    <div class="main-content">
        <div class="post-container" id="postContainer">
            <a href="/posts" class="back-btn">← Назад к постам</a>
            <div id="postContent">
                <div class="loading-spinner"></div>
                <p style="margin-top: 10px; color: var(--text-secondary);">Загрузка поста...</p>
            </div>
        </div>
    </div>

    <div id="notificationsContainer"></div>

    <script src="/js/common.js"></script>
    <script>
        // ⚠️ НЕ ОБЪЯВЛЯЙТЕ currentUser ЗДЕСЬ - она уже есть в common.js!
        // let currentUser = null; ← УДАЛИТЬ ЭТУ СТРОКУ!
        
        let currentPost = null;
        
        // Получаем ID поста из URL
        function getPostId() {
            const path = window.location.pathname;
            const match = path.match(/\/post\/(.+)/);
            return match ? match[1] : null;
        }

        // Инициализация пользователя
        async function initializeUser() {
            try {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    window.location.href = '/login.html';
                    return;
                }

                const response = await fetch('/api/current-user', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.currentUser = data.user;
                    updateUserInterface();
                } else {
                    localStorage.removeItem('authToken');
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                localStorage.removeItem('authToken');
                window.location.href = '/login.html';
            }
        }

        function updateUserInterface() {
            const user = window.currentUser || currentUser;
            if (!user) return;
            
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userUsername = document.getElementById('userUsername');
            const adminPanelBtn = document.getElementById('adminPanelBtn');

            if (user.avatar) {
                userAvatar.innerHTML = `<img src="${user.avatar}" alt="${user.displayName}">`;
            } else {
                userAvatar.textContent = user.displayName ? user.displayName.charAt(0).toUpperCase() : 'U';
            }
            
            userName.textContent = user.displayName || 'Пользователь';
            
            if (user.isDeveloper) {
                adminPanelBtn.style.display = 'flex';
            }

            userUsername.textContent = `@${user.username}`;
        }

        // Загрузка поста
        async function loadPost() {
            const postId = getPostId();
            if (!postId) {
                document.getElementById('postContent').innerHTML = `
                    <div class="post-not-found">
                        <h2>404</h2>
                        <p>Пост не найден</p>
                    </div>
                `;
                return;
            }

            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`/api/posts/${postId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentPost = data.post;
                    renderPost(data.post);
                    renderComments(data.post.comments || []);
                } else {
                    document.getElementById('postContent').innerHTML = `
                        <div class="post-not-found">
                            <h2>404</h2>
                            <p>${data.message || 'Пост не найден'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Ошибка загрузки поста:', error);
                document.getElementById('postContent').innerHTML = `
                    <div class="post-not-found">
                        <h2>Ошибка</h2>
                        <p>Не удалось загрузить пост</p>
                    </div>
                `;
            }
        }

        function renderPost(post) {
            const container = document.getElementById('postContent');
            const user = window.currentUser || currentUser;
            
            let mediaHtml = '';
            if (post.image) {
                mediaHtml = `<div class="post-media"><img src="${post.image}" alt="Изображение поста" style="max-width: 100%; border-radius: 12px;"></div>`;
            } else if (post.file && post.fileType === 'video') {
                mediaHtml = `<div class="post-media"><video controls style="max-width: 100%; border-radius: 12px;"><source src="${post.file}" type="video/mp4"></video></div>`;
            }
            
            const isLiked = post.likes && post.likes.includes(user?.id);
            
            container.innerHTML = `
                <div class="post-full">
                    <div class="post-header">
                        <div class="post-user">
                            <div class="post-avatar">
                                ${post.userAvatar ? 
                                    `<img src="${post.userAvatar}" alt="${post.userName}" style="width: 100%; height: 100%; object-fit: cover;">` : 
                                    post.userName ? post.userName.charAt(0).toUpperCase() : 'U'
                                }
                            </div>
                            <div class="post-user-info">
                                <h4>
                                    ${post.userName || 'Неизвестный'}
                                    ${post.userVerified ? '<span class="verified-badge">✓</span>' : ''}
                                    ${post.userDeveloper ? '<span class="developer-badge">👑</span>' : ''}
                                </h4>
                                <div class="post-time">${new Date(post.createdAt).toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                    <div class="post-content">
                        <div class="post-text" style="font-size: 18px; line-height: 1.6;">${post.text || ''}</div>
                        ${mediaHtml}
                    </div>
                    <div class="post-stats">
                        <span>❤️ <strong>${post.likes ? post.likes.length : 0}</strong> лайков</span>
                        <span>💬 <strong>${post.comments ? post.comments.length : 0}</strong> комментариев</span>
                        <span>👁️ <strong>${post.views || 0}</strong> просмотров</span>
                    </div>
                    <div class="post-actions">
                        <button class="post-action like-btn ${isLiked ? 'liked' : ''}" data-post-id="${post.id}">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path fill="currentColor" d="M12,21.35L10.55,20.03C5.4,15.36 2,12.28 2,8.5C2,5.42 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.09C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.42 22,8.5C22,12.28 18.6,15.36 13.45,20.04L12,21.35Z"/>
                            </svg>
                            <span>${post.likes ? post.likes.length : 0}</span>
                        </button>
                        <button class="post-action share-btn" onclick="sharePost('${post.id}')">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path fill="currentColor" d="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.85L8.91,12.7C8.96,12.47 9,12.24 9,12C9,11.76 8.96,11.53 8.91,11.3L15.96,7.19C16.5,7.69 17.21,8 18,8A3,3 0 0,0 21,5A3,3 0 0,0 18,2A3,3 0 0,0 15,5C15,5.24 15.04,5.47 15.09,5.7L8.04,9.81C7.5,9.31 6.79,9 6,9A3,3 0 0,0 3,12A3,3 0 0,0 6,15C6.79,15 7.5,14.69 8.04,14.19L15.16,18.34C15.11,18.55 15.08,18.77 15.08,19C15.08,20.61 16.39,21.91 18,21.91C19.61,21.91 20.92,20.61 20.92,19A2.92,2.92 0 0,0 18,16.08Z"/>
                            </svg>
                            Поделиться
                        </button>
                    </div>
                </div>
                <div class="comments-section">
                    <h3>Комментарии <span id="commentsCount">${post.comments ? post.comments.length : 0}</span></h3>
                    <div id="commentsList"></div>
                    <div class="add-comment">
                        <textarea id="commentText" placeholder="Напишите комментарий..."></textarea>
                        <button class="send-btn" id="addCommentBtn">Отправить</button>
                    </div>
                </div>
            `;

            // Обработчики
            document.querySelector('.like-btn').addEventListener('click', function() {
                toggleLike(post.id);
            });

            document.getElementById('addCommentBtn').addEventListener('click', function() {
                addComment(post.id);
            });

            document.getElementById('commentText').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    addComment(post.id);
                }
            });
        }

        function renderComments(comments) {
            const list = document.getElementById('commentsList');
            if (!list) return;
            const user = window.currentUser || currentUser;
            
            if (!comments || comments.length === 0) {
                list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Пока нет комментариев. Будьте первым!</p>';
                return;
            }

            list.innerHTML = '';
            comments.forEach(comment => {
                const commentEl = document.createElement('div');
                commentEl.className = 'comment-item';
                
                const isLiked = comment.likes && comment.likes.includes(user?.id);
                
                commentEl.innerHTML = `
                    <div class="comment-header">
                        <div class="comment-avatar">
                            ${comment.userAvatar ? 
                                `<img src="${comment.userAvatar}" alt="${comment.userName}">` : 
                                comment.userName ? comment.userName.charAt(0).toUpperCase() : 'U'
                            }
                        </div>
                        <div>
                            <div class="comment-name">${comment.userName || 'Неизвестный'}</div>
                            <div class="comment-time">${new Date(comment.createdAt).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="comment-text">${comment.text}</div>
                    <div class="comment-actions">
                        <button class="comment-like ${isLiked ? 'liked' : ''}" data-comment-id="${comment.id}">
                            ❤️ <span>${comment.likes ? comment.likes.length : 0}</span>
                        </button>
                        <button class="comment-like reply-toggle" data-comment-id="${comment.id}">
                            💬 Ответить
                        </button>
                    </div>
                    <div class="reply-section" id="reply-section-${comment.id}">
                        <textarea placeholder="Напишите ответ..." id="reply-text-${comment.id}"></textarea>
                        <button class="send-btn" onclick="addReply('${currentPost?.id}', '${comment.id}')">Отправить ответ</button>
                    </div>
                    <div id="replies-${comment.id}">
                        ${comment.replies ? comment.replies.map(reply => `
                            <div class="reply-item">
                                <div class="comment-header">
                                    <div class="comment-avatar">
                                        ${reply.userAvatar ? 
                                            `<img src="${reply.userAvatar}" alt="${reply.userName}">` : 
                                            reply.userName ? reply.userName.charAt(0).toUpperCase() : 'U'
                                        }
                                    </div>
                                    <div>
                                        <div class="comment-name">${reply.userName || 'Неизвестный'}</div>
                                        <div class="comment-time">${new Date(reply.createdAt).toLocaleString()}</div>
                                    </div>
                                </div>
                                <div class="comment-text">${reply.text}</div>
                            </div>
                        `).join('') : ''}
                    </div>
                `;
                
                list.appendChild(commentEl);

                // Обработчики
                commentEl.querySelector('.comment-like').addEventListener('click', function() {
                    likeComment(currentPost.id, comment.id);
                });

                commentEl.querySelector('.reply-toggle').addEventListener('click', function() {
                    const section = document.getElementById(`reply-section-${comment.id}`);
                    section.classList.toggle('active');
                });
            });

            document.getElementById('commentsCount').textContent = comments.length;
        }

        // Лайк поста
        async function toggleLike(postId) {
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`/api/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                if (data.success) {
                    loadPost();
                }
            } catch (error) {
                console.error('Ошибка лайка:', error);
            }
        }

        // Комментарий
        async function addComment(postId) {
            const text = document.getElementById('commentText').value.trim();
            if (!text) {
                alert('Введите текст комментария');
                return;
            }

            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`/api/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ text })
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('commentText').value = '';
                    loadPost();
                }
            } catch (error) {
                console.error('Ошибка комментария:', error);
            }
        }

        // Ответ на комментарий
        async function addReply(postId, commentId) {
            const text = document.getElementById(`reply-text-${commentId}`).value.trim();
            if (!text) {
                alert('Введите текст ответа');
                return;
            }

            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`/api/posts/${postId}/comments/${commentId}/reply`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ text })
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById(`reply-text-${commentId}`).value = '';
                    document.getElementById(`reply-section-${commentId}`).classList.remove('active');
                    loadPost();
                }
            } catch (error) {
                console.error('Ошибка ответа:', error);
            }
        }

        // Лайк комментария
        async function likeComment(postId, commentId) {
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`/api/posts/${postId}/comments/${commentId}/like`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                if (data.success) {
                    loadPost();
                }
            } catch (error) {
                console.error('Ошибка лайка комментария:', error);
            }
        }

        // Поделиться
        function sharePost(postId) {
            const url = `${window.location.origin}/post/${postId}`;
            if (navigator.share) {
                navigator.share({ title: 'Пост из Epic Messenger', url: url });
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Ссылка скопирована!');
                });
            }
        }

        // Выход
        document.getElementById('logoutBtn').addEventListener('click', function() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                localStorage.removeItem('authToken');
                window.location.href = '/login.html';
            }
        });

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            initializeUser().then(() => {
                loadPost();
            });
        });
    </script>
</body>
</html>
